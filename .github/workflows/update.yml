name: Update predictions
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    paths: ["data/manual_results.json", "scripts/**"]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: python scripts/update_predictions.py
      - run: |
          git config user.name "wc-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/predictions.json
          git diff --cached --quiet || git commit -m "auto: update predictions [skip ci]"
          git push
