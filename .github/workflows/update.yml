name: Update predictions
on:
  schedule:
    - cron: "0 */6 * * *"        # every 6 hours
  workflow_dispatch:              # manual "Run" button
  push:
    paths:
      - "data/manual_results.json"  # re-run instantly when you add a score

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/update_predictions.py
      - name: Commit updated predictions
        run: |
          git config user.name "wc-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/predictions.json
          git diff --cached --quiet || git commit -m "auto: update predictions [skip ci]"
          git push
